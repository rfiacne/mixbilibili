name: CI

on:
  push:
    branches: [master]
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: mixbilibili
            ext: ""
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin: mixbilibili
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: mixbilibili.exe
            ext: ".exe"
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Binary size report
        shell: bash
        run: |
          SIZE=$(du -h target/${{ matrix.target }}/release/${{ matrix.bin }} | cut -f1)
          echo "Binary: ${{ matrix.bin }} — Size: $SIZE"
          echo "## Binary Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Binary | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.target }} | ${{ matrix.bin }} | $SIZE |" >> $GITHUB_STEP_SUMMARY

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-dev}"
          ARCHIVE_NAME="mixbilibili-${VERSION}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} "${ARCHIVE_NAME}/"

          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf "dist/${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          fi
          rm -rf "${ARCHIVE_NAME}"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $target = "${{ matrix.target }}"
          $archiveName = "mixbilibili-$version-$target"
          New-Item -ItemType Directory -Force -Path $archiveName | Out-Null
          Copy-Item "target/$target/release/${{ matrix.bin }}" $archiveName
          Compress-Archive -Path $archiveName -DestinationPath "dist/$archiveName.zip"
          Remove-Item -Recurse -Force $archiveName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \\[${VERSION}\\]/{p=1;next}/^## \\[/{p=0}p" CHANGELOG.md)
            if [ -n "$NOTES" ]; then
              echo "notes<<NOTES_EOF" >> $GITHUB_OUTPUT
              echo "$NOTES" >> $GITHUB_OUTPUT
              echo "NOTES_EOF" >> $GITHUB_OUTPUT
            else
              echo "notes=No changelog entries found for version ${VERSION}" >> $GITHUB_OUTPUT
            fi
          else
            echo "notes=CHANGELOG.md not found" >> $GITHUB_OUTPUT
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: mixbilibili-*
          body: ${{ steps.changelog.outputs.notes }}
